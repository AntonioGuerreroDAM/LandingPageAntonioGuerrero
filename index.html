<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deportivo Cachucha | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/hamburgers/1.2.1/hamburgers.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="barra-navegacion" id="Inicio">
        <div class="contenedor-navbar">
            <div class="contenedor-logo">
                <h1 class="nombre-club" id="titulo-animado">DEPORTIVO CACHUCHA</h1>
                <img src="img/cachucha.png" alt="Logo" class="imagen-logo" id="logo-magnetico">
            </div>

            <button class="hamburger hamburger--emphatic" type="button" id="boton-menu">
                <span class="hamburger-box">
                    <span class="hamburger-inner"></span>
                </span>
            </button>
        </div>
    </header>

    <nav class="menu-lateral" id="menu-desplegable">
        <ul class="enlaces-menu">
            <li><a href="#Inicio">Inicio</a></li>
            <li><a href="#plantilla">Plantilla</a></li>
            <li><a href="#clasificacion">Clasificación</a></li>
            <li><a href="#resultados">Resultados</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-overlay"></div>
        </section>

        <section class="seccion-blanca" id="plantilla">
            <div class="contenido-demo">
                <h2>HISTORIA</h2>
                <p>texto de ejemplo</p>
                <div class="espaciador"></div>
            </div>
        </section>

        <!-- SECCIÓN CLASIFICACIÓN CON SLIDER ARRASTRABLE -->
        <section class="seccion-clasificacion" id="clasificacion">
            <div class="clasificacion-header">
                <h2 class="clasificacion-titulo">CLASIFICACIÓN</h2>
                <span class="clasificacion-subtitulo">Liga Local de Fútbol Sala - Puerto Real 25/26</span>
            </div>
            
            <div class="slider-container" id="slider-clasificacion">
                <div class="slider-track" id="slider-track">
                    <!-- Los equipos se generarán con JavaScript -->
                </div>
            </div>
            
            <!-- ELIMINADO: Indicador "Arrastra para ver más equipos" -->
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
